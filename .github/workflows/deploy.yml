name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# 关键：给Actions添加部署Pages的权限
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5 # 升级到v5，兼容新版Node.js

      - name: Setup Node.js
        uses: actions/setup-node@v5 # 升级到v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build # 生成dist文件夹

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3 # 升级到v3
        with:
          path: './dist' # 你的打包输出目录，确认和你项目一致

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # 官方最新版部署Action
